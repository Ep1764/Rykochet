# /etc/nginx/sites-available/rykochet.io.conf
# Serves the built client from /var/www/rykochet/client/dist
# Proxies /api and /ws to the Node game server on 127.0.0.1:3000
# TLS: Cloudflare Origin Certificate (SSL/TLS mode "Full (strict)").

server {
    listen 80;
    listen [::]:80;
    server_name rykochet.io www.rykochet.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rykochet.io www.rykochet.io;

    ssl_certificate     /etc/ssl/cloudflare/rykochet.io.pem;
    ssl_certificate_key /etc/ssl/cloudflare/rykochet.io.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/cloudflare-real-ip.conf;

    root /var/www/rykochet/client/dist;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hashed asset bundles: cache hard, immutable.
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # WebSocket game traffic.
    location /ws/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # HTTP API.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — index.html never cached at edge.
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri /index.html;
    }

    client_max_body_size 4m;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
