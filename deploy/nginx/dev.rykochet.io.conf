# /etc/nginx/sites-available/dev.rykochet.io.conf
# Staging environment. Separate git checkout at /var/www/rykochet-dev,
# separate Node process on :3001, separate DB, HTTP Basic Auth on top.
#
# Set up the developer password once:
#   apt install -y apache2-utils
#   htpasswd -c /etc/nginx/rykochet-dev.htpasswd developer
#
# Add more users later (drop -c):
#   htpasswd /etc/nginx/rykochet-dev.htpasswd another_dev

server {
    listen 80;
    listen [::]:80;
    server_name dev.rykochet.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.rykochet.io;

    ssl_certificate     /etc/ssl/cloudflare/rykochet.io.pem;
    ssl_certificate_key /etc/ssl/cloudflare/rykochet.io.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/cloudflare-real-ip.conf;

    # ---------- Developer-only gate (native browser prompt) ----------
    auth_basic           "Rykochet Dev";
    auth_basic_user_file /etc/nginx/rykochet-dev.htpasswd;
    # ------------------------------------------------------------------

    root /var/www/rykochet-dev/client/dist;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /assets/ {
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri /index.html;
    }

    client_max_body_size 4m;
    gzip on;
}
